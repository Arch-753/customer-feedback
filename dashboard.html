<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:linear-gradient(to bottom,#e0f2fe,#bae6fd);
}

.watermark{
position:fixed;
bottom:20px;
right:20px;
font-size:80px;
opacity:0.05;
font-weight:bold;
color:#0284c7;
pointer-events:none;
}

/* Selected filter option */
.selected{
background:#bae6fd;
color:#0369a1;
border-radius:6px;
}

/* Review card hover */
.review-card{
transition:all 0.2s ease;
}
.review-card:hover{
transform:scale(1.02);
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

/* Graph modal animation */
@keyframes modalFade{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}
.animate-modal{
animation:modalFade 0.25s ease;
}
</style>
</head>

<body class="p-8 text-sky-900">

<div class="watermark">ABC Trading Company</div>

<h1 class="text-3xl font-bold text-center mb-6">
ABC Trading Company
</h1>

<!-- FILTER (TOP LEFT) -->
<div class="mb-6">

<button id="filterBtn"
class="bg-sky-500 text-white px-4 py-2 rounded hover:bg-sky-600 transition">
Filter
</button>

<div id="filterMenu"
class="hidden bg-white p-4 rounded shadow mt-2 w-72">

<p class="font-bold">Sort</p>
<p class="ml-4 sort-option cursor-pointer">Ascending</p>
<p class="ml-4 sort-option cursor-pointer">Descending</p>

<p class="font-bold mt-4">Products</p>
<p class="ml-4 product-filter cursor-pointer">cPVC Pipes</p>
<p class="ml-4 product-filter cursor-pointer">uPVC Pipes</p>
<p class="ml-4 product-filter cursor-pointer">Brass Elbows</p>
<p class="ml-4 product-filter cursor-pointer">SWR Pipes</p>
<p class="ml-4 product-filter cursor-pointer">Curve Pipes</p>
<p class="ml-4 product-filter cursor-pointer">Other Fittings</p>
<p class="ml-4 product-filter cursor-pointer">Tanks</p>

<div class="flex justify-end mt-4">
<button id="applyFilter"
class="bg-sky-500 text-white px-4 py-1 rounded hover:bg-sky-600 transition">
Save
</button>
</div>

</div>
</div>

<!-- AVERAGE RATING -->
<div class="bg-white p-6 rounded shadow mb-6 text-center">
<h2 class="text-xl font-semibold">Average Rating</h2>
<p id="avgRating" class="text-2xl mt-2"></p>
</div>

<!-- REVIEWS -->
<div id="reviewsContainer" class="space-y-4"></div>

<!-- GRAPH MODAL -->
<div id="graphModal"
class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center">

<div class="bg-white p-6 rounded shadow text-center animate-modal">

<h2 class="text-lg font-semibold mb-4">Customer Visit Trend</h2>

<canvas id="visitChart"></canvas>

<button onclick="closeGraph()"
class="bg-sky-500 text-white px-4 py-2 rounded mt-4 hover:bg-sky-600 transition">
Back
</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
