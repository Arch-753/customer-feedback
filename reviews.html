<!DOCTYPE html>
<html>
<head>
<title>Reviews</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:linear-gradient(to bottom,#e0f2fe,#bae6fd);}
.star{cursor:pointer;}
.product-btn{padding:6px 12px;border-radius:6px;background:#e0f2fe;cursor:pointer;}
.product-btn.active{background:#0ea5e9;color:white;}
.fade{animation:fadeIn 0.7s ease-in-out;}
@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body class="text-sky-900">

<h1 class="text-3xl font-bold text-center mt-8 fade">
ABC Trading Company
</h1>

<div class="max-w-lg mx-auto mt-8 bg-white p-6 rounded shadow fade">

<form id="feedbackForm" class="space-y-4">

<input id="firmName" placeholder="Firm's Name"
class="w-full border p-2 rounded">

<input id="customerName" placeholder="Customer's Name"
class="w-full border p-2 rounded" required>

<textarea id="review"
placeholder="Write review..."
class="w-full border p-2 rounded"
required></textarea>

<div>
<p class="font-semibold">Rating *</p>
<div class="flex space-x-2 text-3xl">
<span data-value="1" class="star text-red-500">★</span>
<span data-value="2" class="star text-red-500">★</span>
<span data-value="3" class="star text-red-500">★</span>
<span data-value="4" class="star text-red-500">★</span>
<span data-value="5" class="star text-red-500">★</span>
</div>
</div>

<input type="hidden" id="rating">

<div>
<p class="font-semibold">Select Product *</p>
<div class="flex flex-wrap gap-2 mt-2">
<button type="button" class="product-btn">cPVC Pipes</button>
<button type="button" class="product-btn">uPVC Pipes</button>
<button type="button" class="product-btn">Brass Elbows</button>
<button type="button" class="product-btn">SWR Pipes</button>
<button type="button" class="product-btn">Curve Pipes</button>
<button type="button" class="product-btn">Other Fittings</button>
<button type="button" class="product-btn">Tanks</button>
</div>
</div>

<input type="hidden" id="selectedProduct">

<div>
<label class="font-semibold">Upload Images (Max 3)</label>
<input type="file" id="imageUpload"
multiple accept="image/*"
class="w-full border p-2 rounded mt-2">
<div id="imagePreview" class="flex gap-2 mt-2"></div>
</div>

<button type="submit"
class="w-full bg-sky-500 text-white py-2 rounded hover:scale-105 transition">
Submit Review
</button>

</form>
</div>

<div id="thankYouScreen"
class="hidden fixed inset-0 bg-sky-100 flex flex-col justify-center items-center fade">

<h2 class="text-2xl font-bold mb-6">
Thank you for your valuable feedback
</h2>

<button onclick="location.reload()"
class="bg-sky-500 text-white px-6 py-2 rounded hover:scale-105 transition">
Write Another Review
</button>

</div>

<script src="script.js"></script>
</body>
</html>
