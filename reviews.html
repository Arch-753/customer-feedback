<!DOCTYPE html>
<html>
<head>
<title>Reviews</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Soothing Static Dark Background */
body {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    background-attachment: fixed;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
}

.star { cursor:pointer; transition: transform 0.2s; }
.star:hover { transform: scale(1.3); }

/* Glassmorphism Classes */
.glass {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

.glass-input {
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
}
.glass-input:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.5);
    background: rgba(0, 0, 0, 0.3);
}
.glass-input::placeholder { color: rgba(255, 255, 255, 0.5); }

.product-btn {
    padding: 8px 16px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.3s;
}
.product-btn.active {
    background: linear-gradient(135deg, #3b82f6, #4f46e5);
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
    transform: translateY(-2px);
}
.product-btn:hover:not(.active) {
    background: rgba(255,255,255,0.2);
}

.fade { animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.glow-text { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
</style>
</head>

<body class="min-h-screen py-8 px-4">

<h1 class="text-4xl md:text-5xl font-extrabold text-center mt-4 fade glow-text tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-100 to-indigo-100 mb-8" style="animation-delay: 0.1s;">
ABC Trading Company
</h1>

<div class="max-w-xl mx-auto glass p-8 rounded-2xl fade" style="animation-delay: 0.2s;">

<form id="feedbackForm" class="space-y-4">

<input id="firmName" placeholder="Firm's Name"
class="w-full p-3 rounded-lg glass-input text-white font-semibold">

<input id="customerName" placeholder="Customer's Name"
class="w-full p-3 rounded-lg glass-input text-white font-semibold" required>

<textarea id="review"
placeholder="Write review..."
class="w-full p-3 rounded-lg glass-input text-white font-semibold"
required></textarea>

<div>
<p class="font-semibold">Rating *</p>
<div class="flex space-x-2 text-3xl">
<span data-value="1" class="star text-red-500">★</span>
<span data-value="2" class="star text-red-500">★</span>
<span data-value="3" class="star text-red-500">★</span>
<span data-value="4" class="star text-red-500">★</span>
<span data-value="5" class="star text-red-500">★</span>
</div>
</div>

<input type="hidden" id="rating">

<div>
<p class="font-semibold">Select Product *</p>
<div class="flex flex-wrap gap-2 mt-2">
<button type="button" class="product-btn">cPVC Pipes</button>
<button type="button" class="product-btn">uPVC Pipes</button>
<button type="button" class="product-btn">Brass Elbows</button>
<button type="button" class="product-btn">SWR Pipes</button>
<button type="button" class="product-btn">Curve Pipes</button>
<button type="button" class="product-btn">Other Fittings</button>
<button type="button" class="product-btn">Tanks</button>
</div>
</div>

<input type="hidden" id="selectedProduct">

<div>
<label class="font-semibold text-indigo-100">Upload Images (Max 3)</label>
<input type="file" id="imageUpload"
multiple accept="image/*"
class="w-full p-2 rounded-lg glass-input mt-2 text-sm">
<div id="imagePreview" class="flex gap-2 mt-2"></div>
</div>

<button type="submit"
class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold py-3 rounded-xl hover:shadow-[0_0_20px_rgba(79,70,229,0.5)] transition-all hover:-translate-y-1 mt-4 text-lg">
Submit Review
</button>

<div class="mt-8 pt-4 text-center">
    <a href="history.html" class="text-indigo-200 font-semibold hover:text-white transition drop-shadow py-2 rounded">
        View Previous Reviews
    </a>
</div>

</form>
</div>

<div id="thankYouScreen"
class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xl flex flex-col justify-center items-center fade z-50">

<h2 class="text-3xl font-extrabold mb-6 glow-text text-white">
Thank you for your valuable feedback ✨
</h2>

<button onclick="location.reload()"
class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold px-8 py-3 rounded-xl hover:shadow-[0_0_20px_rgba(79,70,229,0.5)] transition-all hover:-translate-y-1 text-lg">
Write Another Review
</button>

</div>

<script src="script.js"></script>
</body>
</html>
