<!DOCTYPE html>
<html>
<head>
<title>ABC Trading Company</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Soothing Static Dark Background */
body {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    background-attachment: fixed;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
}

.fade { animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Glassmorphism Classes */
.glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.glass-btn {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}

.hover-bounce { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.hover-bounce:hover { transform: translateY(-5px) scale(1.02); }

.glow-text { text-shadow: 0 0 10px rgba(255,255,255,0.3); }
</style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen">

<h1 class="text-5xl md:text-6xl font-extrabold mb-8 fade glow-text text-center mt-[-40px] tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-200 to-indigo-100" style="animation-delay: 0.1s;">
ABC Trading Company
</h1>

<div class="glass p-8 rounded-2xl text-center fade mb-10 max-w-md w-full" style="animation-delay: 0.2s;">
    <h2 class="text-2xl font-semibold mb-3 text-indigo-100 uppercase tracking-widest text-sm">Shop Timings</h2>
    <p class="text-lg text-slate-200">Open all days from <b class="text-white">9:00 AM - 7:00 PM</b></p>
    <div class="mt-4 inline-block px-4 py-1 rounded-full bg-red-500/20 border border-red-500/50">
        <p class="text-red-300 font-bold uppercase tracking-wider text-xs">Sunday Off</p>
    </div>
</div>

<a href="reviews.html" 
   class="fade mb-12 block glass-btn hover-bounce text-white text-2xl md:text-3xl px-16 py-6 rounded-2xl text-center relative overflow-hidden group" style="animation-delay: 0.3s;">
   <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
   <span class="relative z-10 font-bold tracking-wide flex items-center gap-3">
        📝 <span class="bg-clip-text text-transparent bg-gradient-to-r from-white to-sky-100">Submit a Review</span>
   </span>
</a>

<div class="flex flex-col sm:flex-row gap-4 sm:gap-6 fade" style="animation-delay: 0.4s;">
    <a href="admin.html"
       class="glass hover-bounce text-slate-100 px-8 py-4 rounded-xl font-semibold text-center border-white/20 hover:bg-white/10 hover:text-white flex items-center justify-center gap-2">
       🛡️ Admin Login
    </a>
    
    <a href="track.html"
       class="glass hover-bounce bg-white/10 text-white px-8 py-4 rounded-xl font-bold tracking-wide text-center border-sky-300/30 hover:bg-white/20 hover:border-sky-300/50 flex items-center justify-center gap-2">
       📦 View Order Status
    </a>
</div>

</body>
</html>
