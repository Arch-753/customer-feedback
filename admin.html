<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
background:linear-gradient(to bottom,#e0f2fe,#bae6fd);
}
.watermark{
position:fixed;
bottom:20px;
right:20px;
font-size:80px;
opacity:0.05;
font-weight:bold;
color:#0284c7;
pointer-events:none;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen text-sky-900">

<div class="watermark">ABC Trading Company</div>

<div class="bg-white p-8 rounded shadow w-96 text-center">

<h2 class="text-2xl font-bold mb-6">
ABC Trading Company
</h2>

<input type="password"
id="adminPassword"
placeholder="Enter Password"
class="w-full border p-2 rounded mb-4">

<button onclick="login()"
class="w-full bg-sky-500 text-white py-2 rounded hover:bg-sky-600 transition">
Login
</button>

<p id="forgotBtn"
onclick="forgotPassword()"
class="hidden mt-4 text-sm text-sky-600 cursor-pointer">
Forgot Password?
</p>

</div>

<script src="script.js"></script>
</body>
</html>
